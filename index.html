<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniNote AI - Meeting Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/RecordRTC/5.6.2/RecordRTC.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-80 bg-slate-950 border-r border-slate-800 flex flex-col justify-between p-4">
            <div>
                <div class="flex items-center gap-3 mb-8 px-2">
                    <div class="p-2 bg-indigo-600 rounded-lg text-white">
                        <i data-lucide="mic"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">OmniNote AI</span>
                </div>

                <div class="space-y-4">
                    <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider px-2">Configuration</h3>
                    
                    <div class="space-y-1">
                        <label class="text-xs text-slate-400 px-2">Token Endpoint URL</label>
                        <input type="text" id="tokenEndpoint" placeholder="https://your-project.vercel.app/api/token" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
                        <p class="text-xs text-slate-500 px-2 mt-1">Your Vercel endpoint that returns { token: "..." }</p>
                    </div>

                    <div class="space-y-1">
                        <label class="text-xs text-slate-400 px-2">xAI (Grok) Key (Optional)</label>
                        <input type="password" id="grokKey" placeholder="xai-..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
                    </div>

                    <div class="pt-4 border-t border-slate-800 space-y-3">
                        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider px-2">AI Prompts & Tone</h3>
                        <select id="summaryTemplate" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
                            <option value="executive">Executive Summary & Action Items</option>
                            <option value="technical">Technical Architecture & Decisions</option>
                            <option value="casual">Casual Conversation Clean-up</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="border-t border-slate-800 pt-4 px-2 text-xs text-slate-500 space-y-1">
                <div class="flex items-center justify-between">
                    <span>Status:</span>
                    <span id="wsStatus" class="text-rose-400">Disconnected</span>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-full bg-slate-900">
            
            <header class="h-16 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-900/50 backdrop-blur">
                <div class="flex items-center gap-4">
                    <button id="recordBtn" class="flex items-center gap-2 bg-rose-600 hover:bg-rose-500 active:bg-rose-700 text-white font-medium px-4 py-2 rounded-full transition-all">
                        <i data-lucide="circle" class="w-4 h-4" id="recordIcon"></i>
                        <span id="recordText">Start Session</span>
                    </button>
                    <span id="timer" class="font-mono text-sm text-slate-400 hidden">00:00:00</span>
                </div>

                <div class="flex items-center gap-3">
                    <button id="downloadAudioBtn" disabled class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 disabled:opacity-40 text-slate-200 px-3 py-2 rounded-lg text-sm font-medium">
                        <i data-lucide="download" class="w-4 h-4"></i> Save Audio
                    </button>
                    <button id="processAiBtn" disabled class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white px-4 py-2 rounded-lg text-sm font-medium">
                        <i data-lucide="sparkles" class="w-4 h-4"></i> Run Grok Analysis
                    </button>
                </div>
            </header>

            <div class="flex-1 flex overflow-hidden p-6 gap-6">
                
                <div class="flex-1 bg-slate-950 rounded-xl border border-slate-800 flex flex-col overflow-hidden">
                    <div class="px-4 py-3 bg-slate-900 border-b border-slate-800">
                        <span class="text-xs font-semibold uppercase text-slate-400">Live Transcript</span>
                    </div>
                    <div id="transcriptBody" class="flex-1 p-4 overflow-y-auto space-y-4 text-slate-300">
                        <p class="text-slate-500 italic text-sm">Click Start Session, speak, and your transcript will appear here...</p>
                    </div>
                </div>

                <div class="w-[450px] bg-slate-950 rounded-xl border border-slate-800 flex flex-col overflow-hidden">
                    <div class="px-4 py-3 bg-slate-900 border-b border-slate-800">
                        <span class="text-xs font-semibold uppercase text-slate-400">AI Analysis</span>
                    </div>
                    <div id="aiBody" class="flex-1 p-4 overflow-y-auto text-slate-300 text-sm">
                        <div class="text-center py-12 text-slate-500">
                            <i data-lucide="brain-circuit" class="w-12 h-12 mx-auto mb-3 opacity-40"></i>
                            <p>Stop recording and click Run Analysis.</p>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        // DOM Elements
        const recordBtn = document.getElementById('recordBtn');
        const recordIcon = document.getElementById('recordIcon');
        const recordText = document.getElementById('recordText');
        const timer = document.getElementById('timer');
        const wsStatus = document.getElementById('wsStatus');
        const transcriptBody = document.getElementById('transcriptBody');
        const aiBody = document.getElementById('aiBody');
        const downloadAudioBtn = document.getElementById('downloadAudioBtn');
        const processAiBtn = document.getElementById('processAiBtn');
        const tokenEndpointInput = document.getElementById('tokenEndpoint');
        const grokKeyInput = document.getElementById('grokKey');
        const summaryTemplate = document.getElementById('summaryTemplate');

        // State
        let isRecording = false;
        let rtcRecorder = null;
        let stream = null;
        let socket = null;
        let audioContext = null;
        let processor = null;
        let fullTranscriptText = "";
        let audioBlob = null;
        let timerInterval = null;
        let secondsElapsed = 0;

        // Load saved settings
        if(localStorage.getItem('token_endpoint')) tokenEndpointInput.value = localStorage.getItem('token_endpoint');
        if(localStorage.getItem('grok_key')) grokKeyInput.value = localStorage.getItem('grok_key');
        
        tokenEndpointInput.addEventListener('input', (e) => localStorage.setItem('token_endpoint', e.target.value));
        grokKeyInput.addEventListener('input', (e) => localStorage.setItem('grok_key', e.target.value));

        lucide.createIcons();

        function startTimer() {
            secondsElapsed = 0;
            timer.classList.remove('hidden');
            timerInterval = setInterval(() => {
                secondsElapsed++;
                const hrs = String(Math.floor(secondsElapsed / 3600)).padStart(2, '0');
                const mins = String(Math.floor((secondsElapsed % 3600) / 60)).padStart(2, '0');
                const secs = String(secondsElapsed % 60).padStart(2, '0');
                timer.textContent = `${hrs}:${mins}:${secs}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timer.classList.add('hidden');
        }

        function float32ToInt16PCM(float32Array) {
            const int16Array = new Int16Array(float32Array.length);
            for (let i = 0; i < float32Array.length; i++) {
                const s = Math.max(-1, Math.min(1, float32Array[i]));
                int16Array[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return int16Array;
        }

        async function startSession() {
            const tokenEndpoint = tokenEndpointInput.value.trim();
            
            if (!tokenEndpoint) {
                alert("Please enter your Vercel token endpoint URL in the sidebar.");
                return;
            }

            try {
                wsStatus.textContent = "Getting token...";
                wsStatus.className = "text-amber-400";

                // Get temporary token from your Vercel endpoint
                const response = await fetch(tokenEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) {
                    throw new Error(`Token endpoint returned ${response.status}`);
                }

                const data = await response.json();
                if (!data.token) {
                    throw new Error('No token returned');
                }

                wsStatus.textContent = "Connecting...";
                
                // Get microphone
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Setup recording backup
                rtcRecorder = new RecordRTC(stream, {
                    type: 'audio',
                    mimeType: 'audio/webm',
                    recorderType: RecordRTC.StereoAudioRecorder,
                    numberOfAudioChannels: 1,
                    desiredSampRate: 16000
                });
                rtcRecorder.startRecording();

                // Connect WebSocket with token
                const wsUrl = `wss://api.assemblyai.com/v2/realtime/ws?sample_rate=16000&token=${data.token}`;
                socket = new WebSocket(wsUrl);

                socket.onopen = () => {
                    wsStatus.textContent = "Connected";
                    wsStatus.className = "text-emerald-400";
                    transcriptBody.innerHTML = "";
                    fullTranscriptText = "";
                    
                    socket.send(JSON.stringify({
                        session_termination_threshold: 700,
                        disable_partial_transcripts: false,
                        language_code: "en_us"
                    }));
                };

                socket.onmessage = (message) => {
                    const data = JSON.parse(message.data);
                    
                    if (data.message_type === "PartialTranscript") {
                        document.querySelectorAll('.partial-text').forEach(p => p.remove());
                        if (data.text && data.text.trim()) {
                            const partialBlock = document.createElement('p');
                            partialBlock.className = "text-slate-500 italic partial-text pl-3 my-2 border-l-2 border-slate-600";
                            partialBlock.textContent = data.text;
                            transcriptBody.appendChild(partialBlock);
                            transcriptBody.scrollTop = transcriptBody.scrollHeight;
                        }
                    }
                    else if (data.message_type === "FinalTranscript") {
                        document.querySelectorAll('.partial-text').forEach(p => p.remove());
                        if (data.text && data.text.trim()) {
                            fullTranscriptText += (fullTranscriptText ? " " : "") + data.text;
                            const block = document.createElement('p');
                            block.className = "text-slate-200 border-l-2 border-indigo-500 pl-3 my-2";
                            block.textContent = data.text;
                            transcriptBody.appendChild(block);
                            transcriptBody.scrollTop = transcriptBody.scrollHeight;
                        }
                    }
                    else if (data.message_type === "Error") {
                        wsStatus.textContent = `Error`;
                        console.error("Error:", data.error);
                    }
                };

                socket.onerror = () => {
                    wsStatus.textContent = "Error";
                    wsStatus.className = "text-rose-500";
                };
                
                socket.onclose = () => {
                    wsStatus.textContent = "Disconnected";
                    wsStatus.className = "text-rose-400";
                    if (isRecording) stopSession();
                };

                // Audio processing
                audioContext = new AudioContext({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(stream);
                processor = audioContext.createScriptProcessor(4096, 1, 1);

                processor.onaudioprocess = (e) => {
                    if (socket && socket.readyState === WebSocket.OPEN) {
                        const pcm = float32ToInt16PCM(e.inputBuffer.getChannelData(0));
                        socket.send(pcm.buffer);
                    }
                };

                source.connect(processor);
                processor.connect(audioContext.destination);
                audioContext.resume();

                isRecording = true;
                recordBtn.classList.replace('bg-rose-600', 'bg-amber-600');
                recordIcon.setAttribute('data-lucide', 'square');
                recordText.textContent = "Stop Session";
                downloadAudioBtn.disabled = true;
                processAiBtn.disabled = true;
                lucide.createIcons();
                startTimer();

            } catch (err) {
                alert(`Error: ${err.message}`);
                wsStatus.textContent = "Disconnected";
                console.error(err);
            }
        }

        async function stopSession() {
            stopTimer();
            
            if (processor) processor.disconnect();
            if (audioContext) await audioContext.close();
            if (socket && socket.readyState === WebSocket.OPEN) socket.close();
            if (stream) stream.getTracks().forEach(track => track.stop());

            if (rtcRecorder) {
                rtcRecorder.stopRecording(() => {
                    audioBlob = rtcRecorder.getBlob();
                    downloadAudioBtn.disabled = false;
                });
            }

            isRecording = false;
            recordBtn.classList.replace('bg-amber-600', 'bg-rose-600');
            recordIcon.setAttribute('data-lucide', 'circle');
            recordText.textContent = "Start Session";
            processAiBtn.disabled = false;
            lucide.createIcons();
        }

        recordBtn.onclick = () => {
            if (isRecording) stopSession();
            else startSession();
        };

        downloadAudioBtn.onclick = () => {
            if (audioBlob) {
                const url = URL.createObjectURL(audioBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `meeting-audio-${Date.now()}.webm`;
                a.click();
                setTimeout(() => URL.revokeObjectURL(url), 100);
            }
        };

        processAiBtn.onclick = async () => {
            const grokKey = grokKeyInput.value.trim();
            
            if (!grokKey) {
                alert("Please add your xAI (Grok) API key.");
                return;
            }
            if (!fullTranscriptText.trim()) {
                alert("No transcript available. Record first.");
                return;
            }

            const template = summaryTemplate.value;
            let systemPrompt = "You are an expert meeting analyst. Format outputs in clean Markdown.";
            if (template === 'executive') systemPrompt += " Create an executive summary and action items.";
            else if (template === 'technical') systemPrompt += " Focus on technical decisions and architecture.";
            
            aiBody.innerHTML = '<div class="text-slate-400 animate-pulse">Analyzing transcript...</div>';
            
            try {
                const response = await fetch('https://api.x.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${grokKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'grok-beta',
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: `Analyze this transcript:\n\n${fullTranscriptText}` }
                        ],
                        temperature: 0.3
                    })
                });
                const data = await response.json();
                if (data.choices && data.choices[0]) {
                    aiBody.innerHTML = `<div class="text-slate-200 whitespace-pre-wrap">${data.choices[0].message.content}</div>`;
                } else {
                    aiBody.innerHTML = '<p class="text-rose-400">Failed to parse response.</p>';
                }
            } catch (err) {
                aiBody.innerHTML = `<p class="text-rose-400">Error: ${err.message}</p>`;
            }
        };
    </script>
</body>
</html>
